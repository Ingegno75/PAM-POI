<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send to Garmin</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: sans-serif; }
#map { height: 70vh; }

.controls {
  padding:10px;
  display:flex;
  gap:8px;
}

input {
  flex:1;
  padding:8px;
  font-size:16px;
}

button {
  padding:10px;
  font-size:16px;
  cursor:pointer;
}

.status {
  padding:10px;
  font-size:14px;
  color:#333;
}
</style>
</head>

<body>

<div class="controls">
  <input id="search" placeholder="Cerca luogo...">
  <button onclick="searchPlace()">🔎</button>
</div>

<div id="map"></div>

<div class="controls">
  <button onclick="sendToGarmin()">📤 Invia a Garmin</button>
</div>

<div class="status" id="status"></div>

<script>
let map = L.map('map').setView([45.4642, 9.19], 13);
let marker = null;
let selectedLatLng = null;

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

// Click sulla mappa
map.on('click', function(e) {
  setPoint(e.latlng.lat, e.latlng.lng);
});

// Imposta punto
function setPoint(lat, lon) {
  selectedLatLng = { lat, lng: lon };

  if (marker) map.removeLayer(marker);
  marker = L.marker([lat, lon]).addTo(map);

  updateStatus(`Punto selezionato: ${lat.toFixed(5)}, ${lon.toFixed(5)}`);
}

// Ricerca
async function searchPlace() {
  const query = document.getElementById('search').value;
  if (!query) return;

  updateStatus("Ricerca in corso...");

  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${query}`;
  const res = await fetch(url);
  const data = await res.json();

  if (data.length > 0) {
    const place = data[0];
    const lat = parseFloat(place.lat);
    const lon = parseFloat(place.lon);

    map.setView([lat, lon], 15);
    setPoint(lat, lon);

    updateStatus(`Trovato: ${place.display_name}`);
  } else {
    updateStatus("Nessun risultato trovato");
  }
}

// Nome automatico
function generateName() {
  const now = new Date();
  return `WP_${now.getFullYear()}-${(now.getMonth()+1)}-${now.getDate()}_${now.getHours()}-${now.getMinutes()}`;
}

// GPX
function generateGPX(lat, lon, name) {
  return `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="PWA Garmin Sender">
  <wpt lat="${lat}" lon="${lon}">
    <name>${name}</name>
  </wpt>
</gpx>`;
}

// Stato UI
function updateStatus(msg) {
  document.getElementById("status").innerText = msg;
}

// Invio
async function sendToGarmin() {
  if (!selectedLatLng) {
    alert("Seleziona un punto!");
    return;
  }

  const name = generateName();
  const gpx = generateGPX(selectedLatLng.lat, selectedLatLng.lng, name);

  const blob = new Blob([gpx], { type: "application/gpx+xml" });
  const file = new File([blob], `${name}.gpx`, { type: "application/gpx+xml" });

  // SHARE DIRETTO
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        title: "Waypoint Garmin",
        text: "Invio waypoint",
        files: [file]
      });

      updateStatus("Condivisione aperta. Seleziona Garmin Connect.");
      return;

    } catch (err) {
      console.log("Share annullato o fallito");
    }
  }

  // FALLBACK DOWNLOAD
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${name}.gpx`;
  a.click();
  URL.revokeObjectURL(url);

  updateStatus("File scaricato. Aprilo e condividilo con Garmin Connect.");
}
</script>

</body>
</html>
